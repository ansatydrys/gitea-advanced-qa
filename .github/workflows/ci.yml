name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Gitea
        run: |
          docker run -d --name gitea \
            -p 8080:3000 \
            -e GITEA__database__DB_TYPE=sqlite3 \
            -e GITEA__server__HTTP_PORT=3000 \
            -e GITEA__security__SECRET_KEY=test-secret-key \
            -e GITEA__security__INTERNAL_TOKEN=test-internal-token \
            gitea/gitea:1.22
          for i in $(seq 1 40); do
            curl -sf http://localhost:8080/api/v1/version && echo "Gitea ready" && break
            echo "Waiting... $i/40"
            sleep 5
          done

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Gitea with admin account
        run: |
          curl -s -X POST http://localhost:8080/ \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "db_type=sqlite3" \
            --data-urlencode "db_path=/data/gitea/gitea.db" \
            --data-urlencode "app_name=Gitea" \
            --data-urlencode "repo_root_path=/data/gitea/repositories" \
            --data-urlencode "run_user=git" \
            --data-urlencode "domain=localhost" \
            --data-urlencode "ssh_port=22" \
            --data-urlencode "http_port=3000" \
            --data-urlencode "app_url=http://localhost:3000/" \
            --data-urlencode "log_root_path=/data/gitea/log" \
            --data-urlencode "no_reply_address=noreply.localhost" \
            --data-urlencode "admin_name=ansat" \
            --data-urlencode "admin_email=ansat@gitea.local" \
            --data-urlencode "admin_passwd=Ansat12345" \
            --data-urlencode "admin_confirm_passwd=Ansat12345"
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u ansat:Ansat12345 http://localhost:8080/api/v1/user)
          echo "Admin auth check: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Run E2E Tests (Playwright)
        run: npx playwright test --reporter=list,html
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test videos/traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: test-results/
          retention-days: 7

